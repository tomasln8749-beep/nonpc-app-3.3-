<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NoNPC Setup Username</title>
  <meta name="theme-color" content="#06070a">
  <meta name="description" content="Elige tu username en NoNPC.">
  <link rel="manifest" href="../manifest.json">
  <link rel="icon" href="../icons/icon-192.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="../icons/icon-192.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles.css">
</head>
<body>
  <main class="app app-layout auth-page">
    <section class="card auth-card">
      <div class="hero">
        <p class="eyebrow">Ultimo paso</p>
        <h1>Elegi tu username</h1>
        <p class="hero-copy">Va a ser tu identidad publica en desafios, comentarios, validaciones y ranking.</p>
      </div>

      <form id="usernameForm" class="community-form auth-form">
        <div class="field-group">
          <label for="usernameSetupInput">Username</label>
          <input id="usernameSetupInput" class="input" type="text" minlength="3" maxlength="20" autocomplete="nickname" required>
        </div>

        <p class="helper-text" id="usernameHint">Minimo 3 caracteres. Solo letras, numeros, punto, guion y guion bajo.</p>
        <button class="btn btn-primary" type="submit">Confirmar username</button>
      </form>
    </section>
  </main>

  <script type="module" src="./setup-username.js"></script>
</body>
</html>
