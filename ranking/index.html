<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NoNPC Ranking</title>
  <meta name="theme-color" content="#06070a">
  <meta name="description" content="Ranking de usuarios por XP en NoNPC.">
  <link rel="manifest" href="../manifest.json">
  <link rel="icon" href="../icons/icon-192.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="../icons/icon-192.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles.css">
</head>
<body>
  <main class="app app-layout page-stack">
    <section class="card">
      <nav class="top-nav" aria-label="Navegacion principal">
        <a class="nav-link" href="../index.html">Inicio</a>
        <a class="nav-link" href="../missions/">Misiones</a>
        <a class="nav-link" href="../community/">Comunidad</a>
        <a class="nav-link" href="../challenges/">Desafios</a>
        <a class="nav-link" href="../feed/">Feed</a>
        <a class="nav-link nav-link-active" href="./index.html">Ranking</a>
        <a class="nav-link" href="../profile/">Perfil</a>
      </nav>

      <div class="hero">
        <p class="eyebrow">Tabla global</p>
        <h1>Ranking</h1>
        <p class="hero-copy">Los usuarios con mas XP arriba. Mismo estilo, misma energia, sin ruido visual.</p>
      </div>
    </section>

    <section class="history-card page-stack">
      <div class="history-header">
        <h2>Top XP</h2>
        <span id="rankingCount">0 jugadores</span>
      </div>
      <div id="rankingList" class="ideas-list"></div>
      <div id="rankingEmpty" class="empty-state">Todavia no hay usuarios con XP registrado.</div>
    </section>
  </main>

  <script type="module" src="./ranking.js"></script>
</body>
</html>
